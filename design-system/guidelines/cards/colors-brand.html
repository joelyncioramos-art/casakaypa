<!-- @dsCard group="Colors" viewport="700x220" name="Brand Palette" subtitle="The seven client-approved base colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin:0; background:var(--surface-page); font-family:var(--font-body);
         color:var(--text-primary); padding:22px; }
  .row { display:grid; grid-template-columns:repeat(7,1fr); gap:14px; }
  .sw { display:flex; flex-direction:column; gap:8px; }
  .chip { height:88px; border-radius:var(--radius-md); border:1px solid rgba(43,43,43,.08); }
  .nm { font-size:13px; font-weight:var(--fw-medium); letter-spacing:var(--ls-tight); }
  .hex { font-size:12px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.06em; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--ck-warm-ivory)"></div><div class="nm">Warm Ivory</div><div class="hex">#FBF9F4</div></div>
    <div class="sw"><div class="chip" style="background:var(--ck-cream)"></div><div class="nm">Cream</div><div class="hex">#F4EFE6</div></div>
    <div class="sw"><div class="chip" style="background:var(--ck-charcoal)"></div><div class="nm">Charcoal</div><div class="hex">#2B2B2B</div></div>
    <div class="sw"><div class="chip" style="background:var(--ck-sage)"></div><div class="nm">Muted Sage</div><div class="hex">#798C74</div></div>
    <div class="sw"><div class="chip" style="background:var(--ck-seafoam)"></div><div class="nm">Seafoam Wash</div><div class="hex">#6CB197</div></div>
    <div class="sw"><div class="chip" style="background:var(--ck-terracotta)"></div><div class="nm">Terracotta</div><div class="hex">#B56F61</div></div>
    <div class="sw"><div class="chip" style="background:var(--ck-dusty-rose)"></div><div class="nm">Dusty Rose</div><div class="hex">#E2C3BC</div></div>
  </div>
</body>
</html>
