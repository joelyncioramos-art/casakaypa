<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin:0; background:var(--surface-page); font-family:var(--font-body); color:var(--text-primary); padding:24px; }
  .row { display:flex; align-items:baseline; gap:18px; padding:5px 0; }
  .tok { width:150px; flex:none; font-size:11.5px; color:var(--text-muted); letter-spacing:.03em; }
  .word { font-size:34px; line-height:1.15; }
</style>
</head>
<body>
  <div class="row"><div class="tok">Extralight · 200</div><div class="word" style="font-weight:200">Casa Kaypa</div></div>
  <div class="row"><div class="tok">Light · 300</div><div class="word" style="font-weight:300">Casa Kaypa</div></div>
  <div class="row"><div class="tok">Regular · 400</div><div class="word" style="font-weight:400">Casa Kaypa</div></div>
  <div class="row"><div class="tok">Medium · 500</div><div class="word" style="font-weight:500">Casa Kaypa</div></div>
  <div class="row"><div class="tok">Bold · 700</div><div class="word" style="font-weight:700">Casa Kaypa</div></div>
  <div class="row"><div class="tok">Black · 900</div><div class="word" style="font-weight:900">Casa Kaypa</div></div>
</body>
</html>
