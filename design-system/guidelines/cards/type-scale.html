<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin:0; background:var(--surface-page); font-family:var(--font-body); color:var(--text-primary); padding:24px; }
  .row { display:flex; align-items:baseline; gap:16px; border-bottom:1px solid var(--border-default); padding:8px 0; }
  .row:last-child { border-bottom:none; }
  .tok { width:120px; flex:none; font-size:11px; color:var(--text-muted); letter-spacing:.04em; }
  .spec { line-height:var(--lh-tight); }
</style>
</head>
<body>
  <div class="row"><div class="tok">display-l · 60</div><div class="spec" style="font-size:var(--fs-display-l); font-weight:var(--fw-light); letter-spacing:var(--ls-tighter)">Reconnect</div></div>
  <div class="row"><div class="tok">h1 · 36</div><div class="spec" style="font-size:var(--fs-h1); font-weight:var(--fw-regular); letter-spacing:var(--ls-tight)">Weekends made meaningful</div></div>
  <div class="row"><div class="tok">h2 · 28</div><div class="spec" style="font-size:var(--fs-h2); font-weight:var(--fw-medium)">A retreat at the edge of Lima</div></div>
  <div class="row"><div class="tok">h3 · 22</div><div class="spec" style="font-size:var(--fs-h3); font-weight:var(--fw-medium)">Gather, celebrate, create</div></div>
  <div class="row"><div class="tok">body · 17</div><div class="spec" style="font-size:var(--fs-body); font-weight:var(--fw-regular); line-height:var(--lh-normal)">Built over many years with a deep love of architecture and nature.</div></div>
  <div class="row"><div class="tok">caption · 13</div><div class="spec" style="font-size:var(--fs-caption); color:var(--text-secondary)">Santa Eulalia · Peru</div></div>
</body>
</html>
