<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing Scale" subtitle="4px base · airy, unhurried rhythm" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin:0; background:var(--surface-page); font-family:var(--font-body); color:var(--text-primary); padding:24px; }
  .row { display:flex; align-items:center; gap:14px; margin-bottom:8px; }
  .tok { width:150px; font-size:11.5px; color:var(--text-muted); letter-spacing:.03em; }
  .bar { height:16px; background:var(--ck-sage-300); border-radius:var(--radius-xs); }
</style>
</head>
<body>
  <div class="row"><div class="tok">--space-2 · 8</div><div class="bar" style="width:8px"></div></div>
  <div class="row"><div class="tok">--space-4 · 16</div><div class="bar" style="width:16px"></div></div>
  <div class="row"><div class="tok">--space-5 · 24</div><div class="bar" style="width:24px"></div></div>
  <div class="row"><div class="tok">--space-6 · 32</div><div class="bar" style="width:32px"></div></div>
  <div class="row"><div class="tok">--space-7 · 48</div><div class="bar" style="width:48px"></div></div>
  <div class="row"><div class="tok">--space-9 · 96 (section)</div><div class="bar" style="width:96px"></div></div>
</body>
</html>
