<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin:0; background:var(--surface-sunken); font-family:var(--font-body); color:var(--text-primary); padding:28px; }
  .quote { font-style:italic; font-weight:var(--fw-light); font-size:30px; line-height:1.3; letter-spacing:var(--ls-tight); max-width:560px; }
  .cite { margin-top:14px; font-size:13px; letter-spacing:var(--ls-wide); text-transform:uppercase; color:var(--text-secondary); }
  em { font-style:italic; color:var(--text-brand); }
</style>
</head>
<body>
  <div class="quote">A space to <em>reconnect</em> — where weekends turn into unforgettable memories.</div>
  <div class="cite">Boska Light Italic · 400i</div>
</body>
</html>
