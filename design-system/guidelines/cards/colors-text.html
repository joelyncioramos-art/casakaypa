<!-- @dsCard group="Colors" viewport="700x210" name="Text on Color" subtitle="Approved ink pairings — always meet AA on the chosen surface" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin:0; background:var(--surface-page); font-family:var(--font-body); color:var(--text-primary); padding:22px; }
  .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
  .cell { border-radius:var(--radius-md); padding:16px; min-height:96px; display:flex; flex-direction:column; justify-content:space-between; }
  .big { font-size:20px; font-weight:var(--fw-regular); }
  .sm { font-size:12px; opacity:.8; }
</style>
</head>
<body>
  <div class="grid">
    <div class="cell" style="background:var(--ck-warm-ivory); border:1px solid var(--border-default)">
      <div class="big" style="color:var(--text-primary)">Aa Charcoal</div>
      <div class="sm" style="color:var(--text-secondary)">Charcoal on Ivory</div>
    </div>
    <div class="cell" style="background:var(--ck-charcoal)">
      <div class="big" style="color:var(--text-on-dark)">Aa Ivory</div>
      <div class="sm" style="color:rgba(251,249,244,.7)">Ivory on Charcoal</div>
    </div>
    <div class="cell" style="background:var(--ck-sage-500)">
      <div class="big" style="color:var(--text-on-accent)">Aa Ivory</div>
      <div class="sm" style="color:rgba(251,249,244,.85)">Ivory on Sage</div>
    </div>
    <div class="cell" style="background:var(--ck-terracotta-500)">
      <div class="big" style="color:var(--text-on-accent)">Aa Ivory</div>
      <div class="sm" style="color:rgba(251,249,244,.85)">Ivory on Terracotta</div>
    </div>
    <div class="cell" style="background:var(--ck-cream)">
      <div class="big" style="color:var(--text-brand)">Aa Sage 700</div>
      <div class="sm" style="color:var(--text-secondary)">Brand ink on Cream</div>
    </div>
    <div class="cell" style="background:var(--ck-dusty-rose)">
      <div class="big" style="color:var(--ck-terracotta-700)">Aa Terracotta</div>
      <div class="sm" style="color:var(--ck-terracotta-700)">Terracotta 700 on Rose</div>
    </div>
    <div class="cell" style="background:var(--ck-seafoam-100)">
      <div class="big" style="color:var(--ck-seafoam-700)">Aa Seafoam</div>
      <div class="sm" style="color:var(--ck-seafoam-700)">Seafoam 700 on tint</div>
    </div>
    <div class="cell" style="background:var(--ck-sage-100)">
      <div class="big" style="color:var(--ck-sage-700)">Aa Sage</div>
      <div class="sm" style="color:var(--ck-sage-700)">Sage 700 on tint</div>
    </div>
  </div>
</body>
</html>
