<!-- @dsCard group="Spacing" viewport="700x180" name="Corner Radii" subtitle="Soft & organic — pill reserved for tags only" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin:0; background:var(--surface-page); font-family:var(--font-body); color:var(--text-primary); padding:24px; }
  .row { display:flex; gap:20px; }
  .item { display:flex; flex-direction:column; align-items:center; gap:10px; }
  .box { width:84px; height:70px; background:var(--ck-cream); border:1.5px solid var(--border-ink); }
  .tok { font-size:11.5px; color:var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="tok">sm · 4</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><div class="tok">md · 8</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="tok">lg · 14</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="tok">xl · 22</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-pill); width:120px"></div><div class="tok">pill · tags</div></div>
  </div>
</body>
</html>
