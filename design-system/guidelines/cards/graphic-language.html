<!-- @dsCard group="Brand" viewport="700x230" name="Graphic Language" subtitle="Hairline rules & thin-stroke framing echo the line-art logo" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin:0; background:var(--surface-sunken); font-family:var(--font-body); color:var(--text-primary); padding:26px; }
  .wrap { display:flex; gap:26px; align-items:stretch; }
  .framed { flex:1; border:1px solid var(--border-ink); border-radius:var(--radius-sm); padding:22px; position:relative; background:var(--surface-page); }
  .over { text-transform:uppercase; letter-spacing:var(--ls-wider); font-size:11px; color:var(--text-brand); font-weight:var(--fw-medium); }
  .ttl { font-size:26px; font-weight:var(--fw-light); letter-spacing:var(--ls-tight); margin:10px 0 14px; }
  .rule { height:1px; background:var(--border-ink); margin:14px 0; }
  .rule.thin { background:var(--border-hairline); }
  .rule.short { width:48px; height:2px; background:var(--ck-terracotta-500); }
  .logo { width:120px; display:block; }
  .side { display:flex; flex-direction:column; justify-content:center; gap:10px; }
  .lbl { font-size:11.5px; color:var(--text-muted); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="framed">
      <div class="over">Santa Eulalia</div>
      <div class="ttl">Room to breathe</div>
      <div class="rule short"></div>
      <div class="rule"></div>
      <div class="rule thin"></div>
    </div>
    <div class="side">
      <img class="logo" src="../../assets/logo/casa-kaypa-logo.png" alt="Casa Kaypa">
      <div class="lbl">1px ink rules · thin-stroke frames<br>generous negative space · botanical line accents</div>
    </div>
  </div>
</body>
</html>
