<!-- @dsCard group="Brand" viewport="700x260" name="Logo" subtitle="Primary mark on light & dark. Keep proportions & colors exact" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin:0; background:var(--surface-page); font-family:var(--font-body); color:var(--text-primary); padding:22px; }
  .row { display:flex; gap:18px; }
  .panel { flex:1; border-radius:var(--radius-lg); display:flex; align-items:center; justify-content:center; height:200px; }
  .panel img { height:150px; }
  .cap { text-align:center; margin-top:8px; font-size:11.5px; color:var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div>
      <div class="panel" style="background:var(--surface-page); border:1px solid var(--border-default)">
        <img src="../../assets/logo/casa-kaypa-logo.png" alt="Casa Kaypa">
      </div>
      <div class="cap">Primary · on Ivory / Cream / White</div>
    </div>
    <div>
      <div class="panel" style="background:var(--surface-inverse)">
        <img src="../../assets/logo/casa-kaypa-logo-reversed.png" alt="Casa Kaypa reversed">
      </div>
      <div class="cap">Reversed · on Charcoal only</div>
    </div>
  </div>
</body>
</html>
