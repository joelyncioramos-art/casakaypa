name: Publicar sitio en GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:
  # Un push hecho con el GITHUB_TOKEN automático (como el commit del
  # bot de sync-airbnb.yml) NO dispara el evento "push" de otros
  # workflows — es una protección de GitHub contra loops infinitos.
  # Por eso también se escucha cuando termina esa sincronización.
  workflow_run:
    workflows: ["Sincronizar calendario de Airbnb"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    # Si el disparador fue la sincronización, publicar solo si terminó
    # bien (nada que desplegar si el sync falló).
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Subir artefacto (carpeta site/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
